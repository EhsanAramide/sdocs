name: fetch docs

on:
  push:
    paths:
      - "config/docs.list"
  
  workflow_dispatch:

jobs:
  fetch:

    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:

    - uses: actions/checkout@v4

    - name: install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y zstd
        pip install -r requirements.txt

    - name: fetching docs.list
      run: make fetch
    
    - name: sanitizing assets
      run: make sanitize
        
    - name: compressing fetched docs
      run: make compress

    - name: commit artifacts
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add compressed/

        git commit -m "update(compressed): update documents."

        git push
